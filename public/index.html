<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neal Hushbeck | Filmmaker</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://use.typekit.net/wdf7tnx.css">
<meta name="viewport" content="width-device-width, initial-scale-1">
<meta name="description" content="Neal Hushbeck | Filmmaker">
<link rel="icon" type="image/x-icon" href="images/NHFavicon.ico">
</head>

	<nav class="desktopNav">
		
		<div class="pageHeader">Neal Hushbeck</div>
		
		<div class="navItems"> 
		<a href="#">PROJECTS</a> 
		<a href="#">RESUME</a> 
		<a href="#">CONTACT</a> 
		</div>
	
		<div class="social">

		<a href="https://www.instagram.com/nealhushbeck/"><img src="images/instagram.png" alt="Instagram"></a>
		</div>
		
	</nav>
	
<body>
	
	<div class="headGrid">
	<img class="mainImg" src="images/A21BA289-DE1C-4844-8026-53AF2D31DFBE.jpg" alt="Image">
	</div>
	
	<div class="section-header">
  	<span>Images</span>
	</div>
<div id="lightbox" class="lightbox">
  	<img id="lightbox-img" alt=""/>
	</div>

	<div class="grid" id="grid"></div>

<script>
const header = document.querySelector('.pageHeader');

window.addEventListener('scroll', () => {
  if (window.scrollY > 50) {
    header.classList.add('shrink');
  } else {
    header.classList.remove('shrink');
  }
});
</script>
	<script>
	fetch('/gridImages')
  .then(res => res.json())
  .then(images => {
    const grid = document.getElementById('grid');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    images.forEach(img => {
      const el = document.createElement('img');
      el.src = img;

      // click to open fullscreen
      el.addEventListener('click', () => {
        lightbox.classList.add('active');
        lightboxImg.src = img;
      });

      grid.appendChild(el);
    });

    // click background to close
    lightbox.addEventListener('click', () => {
      lightbox.classList.remove('active');
    });
  });
	</script>
</body>
</html>
